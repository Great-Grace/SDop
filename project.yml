name: SDop
options:
  bundleIdPrefix: com.greatgrace
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: SDop/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.greatgrace.sdop
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentOrange

targets:
  SDop:
    type: application
    platform: iOS
    sources:
      - path: SDop
        excludes:
          - "**/.DS_Store"
    resources:
      - path: SDop/Resources
    settings:
      base:
        INFOPLIST_FILE: SDop/Info.plist
        CODE_SIGN_ENTITLEMENTS: Config/SDop.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: "SDop!"
        INFOPLIST_KEY_NSFaceIDUsageDescription: "SDop! 앱 잠금 해제를 위해 Face ID를 사용합니다."
        GENERATE_INFOPLIST_FILE: false

  SDopShieldExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: SDopShieldExtension
    dependencies:
      - target: SDop
        embed: false
    settings:
      base:
        INFOPLIST_FILE: SDopShieldExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: Config/ShieldExtension.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.greatgrace.sdop.shield
        SKIP_INSTALL: true

  SDopDeviceActivityExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: SDopDeviceActivityExtension
    dependencies:
      - target: SDop
        embed: false
    settings:
      base:
        INFOPLIST_FILE: SDopDeviceActivityExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: Config/DeviceActivity.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.greatgrace.sdop.deviceactivity
        SKIP_INSTALL: true
